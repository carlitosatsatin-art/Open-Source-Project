<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Smart Tech</title>
  <link rel="stylesheet" href="../CSS/navBar.css">
  <link rel="stylesheet" href="../CSS/order.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="logo">Smart Tech</h1>
      
      <div class="search-container">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" placeholder="Search" class="search-input">
      </div>

      <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="order.html" class="active">Order</a>
        <a href="cart.html">Cart</a>
        <div class="profile-icon">
          <i class="fa-solid fa-user"></i>
        </div>
      </div>
    </div>
  </nav>

  <div class="orders-page">
    <h1 class="page-title">Orders</h1>

    <div class="orders-container">
        <table class="orders-table">
            <thead>
                <tr>
                    <th>Product Ordered</th>
                    <th>Variations</th>
                    <th>Quantity</th>
                    <th>Total Price</th>
                    <th>Status</th>
                    <th>Date of arrival</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="product-cell">
                        <img src="../categ/pictures/GIGABYTE RTX 4090.jpg" 
                             alt="RTX 4090" 
                             class="product-img">
                        <div class="product-info">
                            <strong>GIGABYTE GeForce RTX 4090 D 24GB WINDFORCE [CDM]</strong>
                        </div>
                    </td>
                    <td>WINDFORCE CDM</td>
                    <td class="qty-col">1</td>
                    <td class="price-col">₱5,000</td>
                    <td class="status-col">
                        <span class="status shipped">Shipped</span>
                    </td>
                    <td class="date-col">June 1, 2026</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
