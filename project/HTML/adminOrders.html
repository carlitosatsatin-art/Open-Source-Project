<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Smart Tech Admin</title>
  <link rel="stylesheet" href="../CSS/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="admin-layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-logo">Smart Tech <span>Admin Panel</span></div>
    <div class="sb-nav">
      <div class="sb-label">Main</div>
      <a href="adminDashboard.html" class="sb-item"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="adminProducts.html"  class="sb-item"><i class="fa-solid fa-box"></i> Products</a>
      <a href="adminOrders.html"    class="sb-item active"><i class="fa-solid fa-cart-shopping"></i> Orders</a>
      <a href="adminUsers.html"     class="sb-item"><i class="fa-solid fa-users"></i> Customers</a>
    </div>
    <div class="sb-bottom">
      <div class="admin-badge">
        <div class="admin-av">A</div>
        <div class="admin-info">Admin <span>smarttech@admin.com</span></div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Orders</div>
      <div class="topbar-right">
        <div class="date-chip"><i class="fa-solid fa-calendar" style="margin-right:6px;"></i>May 2026</div>
        <div class="notif-btn"><i class="fa-solid fa-bell"></i><div class="notif-dot"></div></div>
      </div>
    </div>

    <div class="content">

      <!-- Stat Cards -->
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon ic-purple"><i class="fa-solid fa-cart-shopping"></i></div>
          <div class="stat-label">Total Orders</div>
          <div class="stat-value">1,248</div>
          <div class="stat-sub"><i class="fa-solid fa-trending-up"></i> +8.1% this month</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon ic-amber"><i class="fa-solid fa-clock"></i></div>
          <div class="stat-label">Pending</div>
          <div class="stat-value">34</div>
          <div class="stat-sub down"><i class="fa-solid fa-triangle-exclamation"></i> Needs action</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon ic-blue"><i class="fa-solid fa-spinner"></i></div>
          <div class="stat-label">Processing</div>
          <div class="stat-value">89</div>
          <div class="stat-sub muted"><i class="fa-solid fa-minus"></i> In progress</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon ic-green"><i class="fa-solid fa-truck"></i></div>
          <div class="stat-label">Shipped</div>
          <div class="stat-value">1,125</div>
          <div class="stat-sub"><i class="fa-solid fa-trending-up"></i> Delivered on time</div>
        </div>
      </div>

      <!-- Orders Table -->
      <div class="card">
        <div class="filter-bar">
          <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search by order ID or customer…" oninput="filterTable()">
          </div>
          <select class="filter-select" id="statusFilter" onchange="filterTable()">
            <option value="">All Status</option>
            <option>Pending</option>
            <option>Processing</option>
            <option>Shipped</option>
            <option>Cancelled</option>
          </select>
        </div>

        <div style="overflow-x: auto;">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Product</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Date</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="ordersBody">
              <!-- Rows injected by JS -->
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let orders = [
    { id:'#ST-0001', customer:'John Dela Cruz',   email:'john@email.com',  product:'RTX 4090 Windforce',         qty:1, total:5000,  date:'May 24, 2026', status:'Shipped'    },
    { id:'#ST-0002', customer:'Maria Santos',     email:'maria@email.com', product:'AMD Ryzen 9 7950X',          qty:1, total:28000, date:'May 24, 2026', status:'Processing' },
    { id:'#ST-0003', customer:'Carlo Reyes',      email:'carlo@email.com', product:'Corsair 32GB DDR5',          qty:2, total:25000, date:'May 23, 2026', status:'Pending'    },
    { id:'#ST-0004', customer:'Ana Lopez',        email:'ana@email.com',   product:'ASUS ROG Strix B650E',       qty:1, total:18000, date:'May 23, 2026', status:'Shipped'    },
    { id:'#ST-0005', customer:'Benjamin Torres',  email:'ben@email.com',   product:'Seasonic 850W Gold',         qty:1, total:7200,  date:'May 22, 2026', status:'Processing' },
    { id:'#ST-0006', customer:'Grace Villanueva', email:'grace@email.com', product:'Samsung 990 Pro 2TB SSD',    qty:1, total:9800,  date:'May 22, 2026', status:'Shipped'    },
    { id:'#ST-0007', customer:'Rico Magno',       email:'rico@email.com',  product:'Noctua NH-D15 CPU Cooler',   qty:1, total:4500,  date:'May 21, 2026', status:'Pending'    },
    { id:'#ST-0008', customer:'Liza Navarro',     email:'liza@email.com',  product:'MSI RTX 4080 SUPRIM X',      qty:1, total:45000, date:'May 20, 2026', status:'Cancelled'  },
    { id:'#ST-0009', customer:'Jun Bautista',     email:'jun@email.com',   product:'Intel Core i9-14900K',       qty:1, total:32000, date:'May 19, 2026', status:'Shipped'    },
    { id:'#ST-0010', customer:'Cathy Flores',     email:'cathy@email.com', product:'Gigabyte Z790 AORUS Elite',  qty:1, total:22000, date:'May 18, 2026', status:'Processing' },
  ];

  const pillMap = {
    'Pending':    'pill-pending',
    'Processing': 'pill-process',
    'Shipped':    'pill-shipped',
    'Cancelled':  'pill-cancelled',
  };

  function initials(name) {
    return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function renderTable(data) {
    const tbody = document.getElementById('ordersBody');
    tbody.innerHTML = data.map(o => `
      <tr>
        <td><span class="order-id">${o.id}</span></td>
        <td>
          <div class="customer-cell">
            <div class="cust-av">${initials(o.customer)}</div>
            <div>
              <div class="cust-name">${o.customer}</div>
              <div class="cust-email">${o.email}</div>
            </div>
          </div>
        </td>
        <td style="max-width:200px;">
          <div style="font-size:12px;font-weight:600;color:#1f2937;line-height:1.4;">${o.product}</div>
        </td>
        <td style="text-align:center;font-weight:600;">${o.qty}</td>
        <td style="font-weight:700;color:#4E0B99;">₱${o.total.toLocaleString()}</td>
        <td style="font-size:12px;color:#6b7280;">${o.date}</td>
        <td>
          <select class="status-select" onchange="updateStatus('${o.id}', this.value)">
            <option ${o.status==='Pending'    ? 'selected' : ''}>Pending</option>
            <option ${o.status==='Processing' ? 'selected' : ''}>Processing</option>
            <option ${o.status==='Shipped'    ? 'selected' : ''}>Shipped</option>
            <option ${o.status==='Cancelled'  ? 'selected' : ''}>Cancelled</option>
          </select>
        </td>
      </tr>
    `).join('');
  }

  function filterTable() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const st = document.getElementById('statusFilter').value;
    const filtered = orders.filter(o =>
      (o.id.toLowerCase().includes(q) || o.customer.toLowerCase().includes(q)) &&
      (st === '' || o.status === st)
    );
    renderTable(filtered);
  }

  function updateStatus(orderId, newStatus) {
    const o = orders.find(x => x.id === orderId);
    if (o) {
      o.status = newStatus;
      showToast(`Order ${orderId} → ${newStatus}`, 'success');
    }
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.innerHTML = '<i class="fa-solid fa-circle-check" style="margin-right:6px;"></i>' + msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
  }

  renderTable(orders);
</script>
</body>
</html>
