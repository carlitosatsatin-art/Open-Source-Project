<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications | Smart Tech</title>

<link rel="stylesheet" href="grok-home.css">
<link rel="stylesheet" href="dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.modal-buttons {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
}

.notification-empty {
    text-align: center;
    padding: 30px;
    color: gray;
    font-size: 1rem;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-container">

        <h1 class="logo">Smart Tech</h1>

        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" placeholder="Search"
            class="search-input">
        </div>

        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="#">Shop</a>
            <a href="#">Order</a>
            <a href="#">Cart</a>

            <div class="profile-icon">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
    </div>
</nav>

<!-- DASHBOARD -->
<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="user-box">
            <i class="fa-solid fa-circle-user"></i>
            <span id="sidebarName">User</span>
        </div>

        <a href="profile.html">
            <i class="fa-solid fa-user"></i>
            My Profile
        </a>

        <a href="address.html">
            <i class="fa-solid fa-location-dot"></i>
            Address
        </a>

        <a href="notification.html" class="active">
            <i class="fa-solid fa-bell"></i>
            Notifications
        </a>

        <a href="#"
        class="logout-btn"
        onclick="logoutUser()">
            <i class="fa-solid fa-right-from-bracket"></i>
            Log Out
        </a>

        <a href="home.html" class="home-btn">
            <i class="fa-solid fa-house"></i>
            Back to Home
        </a>

    </aside>

    <!-- MAIN CONTENT -->
    <main class="content">

        <div class="welcome-box">
            <h1 id="welcomeText">Welcome back, User!</h1>
            <p>Manage your account information</p>
        </div>

        <!-- PROFILE HEADER -->
        <div class="profile-card">

            <div class="profile-left">
                <i class="fa-solid fa-circle-user big-icon"></i>
                <h2 id="profileName">User</h2>
            </div>

            <button class="btn-primary"
            onclick="openEditModal()">
                <i class="fa-solid fa-pen"></i>
                Edit Profile
            </button>

        </div>

        <!-- ORDER NOTIFICATIONS -->
        <div class="notification-card" id="notificationCard">

            <div class="table-header">

                <div>Product</div>
                <div>Unit Price</div>
                <div>Quantity</div>
                <div>Total Price</div>
                <div>Status</div>

            </div>

            <div class="product-row" id="productRow">

                <div class="product-info">

                    <img src="gpu.png"
                    alt="RTX">

                    <div>
                        <h4>GIGABYTE GeForce RTX 3050</h4>
                        <p>2X WindForce OC</p>
                    </div>

                </div>

                <div>$300</div>
                <div>1</div>
                <div>$300</div>

                <div>
                    <span class="status delivered">
                        Delivered
                    </span>
                </div>

            </div>

            <button
            class="btn-secondary clear-btn"
            onclick="clearNotifications()">
                <i class="fa-solid fa-trash"></i>
                Clear Notifications
            </button>

        </div>

    </main>
</div>

<!-- EDIT PROFILE MODAL -->
<div class="modal" id="editModal">
    <div class="modal-content">

        <h2>Edit Profile</h2>

        <div class="form-group">
            <label>Name</label>
            <input type="text" id="editName">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="editPhone">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select id="editGender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="editDob">
        </div>

        <div class="modal-buttons">
            <button class="btn-secondary"
            onclick="closeEditModal()">
                Cancel
            </button>

            <button class="btn-primary"
            onclick="saveProfile()">
                Save
            </button>
        </div>

    </div>
</div>

<script>

// PROFILE DATA
let profileData = {
    name: "User",
    phone: "06967676711",
    gender: "Male",
    dob: "2000-01-01"
};

// LOAD SAVED PROFILE
window.onload = function () {

    const savedProfile =
    localStorage.getItem("profileData");

    if(savedProfile){
        profileData = JSON.parse(savedProfile);
    }

    updateProfileUI();

    // CHECK IF NOTIFICATIONS CLEARED
    const cleared =
    localStorage.getItem("notificationsCleared");

    if(cleared === "true"){
        removeNotifications();
    }
};

// UPDATE PROFILE UI
function updateProfileUI(){

    document.getElementById("profileName")
    .innerText = profileData.name;

    document.getElementById("sidebarName")
    .innerText = profileData.name;

    document.getElementById("welcomeText")
    .innerText = `Welcome back, ${profileData.name}!`;
}

// OPEN MODAL
function openEditModal(){

    document.getElementById("editModal")
    .style.display = "flex";

    document.getElementById("editName")
    .value = profileData.name;

    document.getElementById("editPhone")
    .value = profileData.phone;

    document.getElementById("editGender")
    .value = profileData.gender;

    document.getElementById("editDob")
    .value = profileData.dob;
}

// CLOSE MODAL
function closeEditModal(){
    document.getElementById("editModal")
    .style.display = "none";
}

// SAVE PROFILE
function saveProfile(){

    profileData.name =
    document.getElementById("editName").value;

    profileData.phone =
    document.getElementById("editPhone").value;

    profileData.gender =
    document.getElementById("editGender").value;

    profileData.dob =
    document.getElementById("editDob").value;

    localStorage.setItem(
        "profileData",
        JSON.stringify(profileData)
    );

    updateProfileUI();

    closeEditModal();

    alert("Profile updated successfully!");
}

// CLEAR NOTIFICATIONS
function clearNotifications(){

    localStorage.setItem(
        "notificationsCleared",
        "true"
    );

    removeNotifications();
}

// REMOVE NOTIFICATION CONTENT
function removeNotifications(){

    document.getElementById("notificationCard")
    .innerHTML = `
        <div class="notification-empty">
            <i class="fa-solid fa-bell-slash"></i>
            <p>No notifications available.</p>
        </div>
    `;
}

// LOGOUT
function logoutUser(){
    alert("Logged out successfully!");
    window.location.href = "home.html";
}

// CLOSE MODAL WHEN CLICKING OUTSIDE
window.onclick = function(event){

    const modal =
    document.getElementById("editModal");

    if(event.target === modal){
        closeEditModal();
    }
};

</script>

</body>
</html>
