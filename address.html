<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Address | Smart Tech</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eeecf0, #4e0290);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.info-card {
    background: #fff;
    padding: 30px;
    width: 380px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(78, 11, 153, 0.3);
}

.info-row {
    margin-bottom: 15px;
}

.info-row span {
    display: block;
    font-size: 0.8rem;
    color: gray;
}

.info-row strong {
    font-size: 1rem;
}

.btn-primary {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #eeeaf4;
    color: rgb(57, 1, 81);
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s ease;
}

.btn-primary:hover {
    background: #d6b7f9;
}

/* Hidden Edit Form */
.edit-form {
    display: none;
    margin-top: 15px;
}

.edit-form input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="info-card">

    <div class="info-row">
        <span>Full Name</span>
        <strong id="nameText">User</strong>
    </div>

    <div class="info-row">
        <span>Phone Number</span>
        <strong id="phoneText">06967676711</strong>
    </div>

    <div class="info-row">
        <span>Address</span>
        <strong id="addressText">Region, Province, City, Barangay</strong>
    </div>

    <div class="info-row">
        <span>Label</span>
        <strong id="labelText">Home</strong>
    </div>

    <!-- Edit Button -->
    <button class="btn-primary" onclick="editAddress()">
        <i class="fa-solid fa-location-dot"></i> Edit Address
    </button>
    <!-- Back Button -->
    <button class="btn-primary" onclick="goBackProfile()">
        <i class="fa-solid fa-arrow-left"></i> Back to Profile
    </button>


    <!-- Hidden Form -->
    <div class="edit-form" id="editForm">
        <input type="text" id="newName" placeholder="Enter Full Name">
        <input type="text" id="newPhone" placeholder="Enter Phone Number">
        <input type="text" id="newAddress" placeholder="Enter New Address">
        <input type="text" id="newLabel" placeholder="Enter Label (Home/Work)">
        <button class="btn-primary" onclick="saveAddress()">Save</button>
    </div>

</div>

<script>
function editAddress() {
    document.getElementById("editForm").style.display = "block";
}
function goBackProfile() {
    window.location.href = "profile.html";
}

function saveAddress() {

    let name = document.getElementById("newName").value;
    let phone = document.getElementById("newPhone").value;
    let address = document.getElementById("newAddress").value;
    let label = document.getElementById("newLabel").value;

    if(name) document.getElementById("nameText").innerText = name;
    if(phone) document.getElementById("phoneText").innerText = phone;
    if(address) document.getElementById("addressText").innerText = address;
    if(label) document.getElementById("labelText").innerText = label;

    document.getElementById("editForm").style.display = "none";

    // Clear inputs
    document.getElementById("newName").value = "";
    document.getElementById("newPhone").value = "";
    document.getElementById("newAddress").value = "";
    document.getElementById("newLabel").value = "";
}
</script>

</body>
</html>
